version: "3.9"
services:
  qrcode:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5540:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=file:./prisma/dev.db
      - JWT_SECRET=change-me-in-production
      - BASE_URL=http://localhost:5540
    restart: unless-stopped
