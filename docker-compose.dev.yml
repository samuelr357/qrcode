version: "3.9"
services:
  qrcode:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "8080:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - DATABASE_URL=file:./prisma/dev.db
      - JWT_SECRET=dev-secret
      - BASE_URL=http://localhost:8080
    volumes:
      - .:/app
      - /app/node_modules
    command: sh -c "npm install && npx prisma generate && npx prisma db push && npm run dev -- -H 0.0.0.0 -p 3000"
    restart: unless-stopped
