version: "3.9"
services:
  app:
    build:
      context: ${GIT_REPO}
      dockerfile: ${GIT_DOCKERFILE:-Dockerfile}
    ports:
      - "${APP_PORT:-5540}:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=file:./prisma/dev.db
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - BASE_URL=${BASE_URL:-http://localhost:${APP_PORT:-5540}}
    restart: unless-stopped
